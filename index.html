    `, [
        {label:'Скасувати', action:'close'},
        {label:'Додати', action:'submit-add-lesson', primary:true, id:m.payload.studentId||'', date:m.payload.date||''}
      ]);
    }

    if(m.type==='edit-lesson'){
      const l = data.lessons.find(x=>x.id===m.payload.id);
      return modalWrap('Заняття · '+esc(lessonLabel(l)), `
        <div class="row2">
          <div class="field"><label>Дата</label><input type="date" id="f-date" value="${l.date}"></div>
          <div class="field"><label>Час</label><input type="time" id="f-time" value="${l.time||''}"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Статус</label>
            <select id="f-status">
              <option value="planned" ${l.status==='planned'?'selected':''}>заплановано</option>
              <option value="done" ${l.status==='done'?'selected':''}>проведено</option>
              <option value="cancelled" ${l.status==='cancelled'?'selected':''}>скасовано</option>
            </select>
          </div>
          <div class="field"><label>Тривалість (хв)</label><input type="number" id="f-duration" value="${l.durationMin || 60}"></div>
        </div>
        <div class="field"><label>Коментар</label><input type="text" id="f-comment" value="${esc(l.comment||'')}"></div>
      `, [
        {label:'Видалити', action:'submit-del-lesson', danger:true, id:l.id},
        {label:'Скасувати', action:'close'},
        {label:'Зберегти', action:'submit-edit-lesson', primary:true, id:l.id}
      ]);
    }

    if(m.type==='add-adjustment') return modalWrap('Ручне коригування', `
      <div class="row2">
        <div class="field"><label>Дата</label><input type="date" id="f-date" value="${todayISO()}"></div>
        <div class="field"><label>Сума (± ₴)</label><input type="number" id="f-amount" placeholder="напр. 500 або -200"></div>
      </div>
      <div class="field"><label>Опис</label><input type="text" id="f-note" placeholder="напр. премія, штраф, аванс…"></div>
    `, [
      {label:'Скасувати', action:'close'},
      {label:'Додати', action:'submit-add-adjustment', primary:true}
    ]);

    if(m.type==='add-group') return modalWrap('Нова група', `
      <div class="field"><label>Назва групи</label><input type="text" id="f-group-name" placeholder="напр. Група B1 · пн/ср"></div>
      <div class="field"><label>Учасники</label>
        <div style="max-height:220px; overflow:auto; border:1px solid var(--line); border-radius:7px; padding:8px;">
          ${data.students.length? data.students.sort((a,b)=>a.name.localeCompare(b.name,'uk')).map(s=>`
            <label style="display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; text-transform:none; letter-spacing:0; color:var(--ink); font-weight:400;">
              <input type="checkbox" class="group-member-cb" value="${s.id}" style="width:auto;"> ${esc(s.name)}
            </label>`).join('') : `<div class="empty">Спершу додайте учнів</div>`}
        </div>
      </div>
      <div class="row2">
        <div class="field"><label>Група школи чи особиста</label>
          <select id="f-group-affiliation">
            <option value="school">В межах школи</option>
            <option value="private">Особиста група (поза школою)</option>
          </select>
        </div>
        <div class="field"><label>Рівень</label>${levelSelectHTML('f-group-level', '')}</div>
      </div>
      <div class="row3">
        <div class="field"><label>Тривалість (хв)</label><input type="number" id="f-group-duration" value="60"></div>
        <div class="field"><label>Частота (раз/тиждень)</label><input type="number" id="f-group-freq" value="1"></div>
        <div class="field"><label>Ціна за заняття</label><input type="number" id="f-group-price" placeholder="200"></div>
      </div>
      <div style="font-size:11px; color:var(--ink-faint); margin-top:-8px;">Для групи в межах школи ціна — це фіксована оплата за проведене заняття, незалежно від кількості учнів. Для особистої групи (поза школою) оплата й надалі рахується як сума цін кожного учня.</div>
      ${fixedScheduleFieldsHTML(null, 'f-group-freq')}
    `, [
      {label:'Скасувати', action:'close'},
      {label:'Створити', action:'submit-add-group', primary:true}
    ]);

    if(m.type==='edit-group'){
      const g = groupById(m.payload.id);
      const gAff = g.affiliation || 'school';
      return modalWrap('Редагувати групу', `
        <div class="field"><label>Назва групи</label><input type="text" id="f-group-name" value="${esc(g.name)}"></div>
        <div class="field"><label>Учасники</label>
          <div style="max-height:220px; overflow:auto; border:1px solid var(--line); border-radius:7px; padding:8px;">
            ${data.students.sort((a,b)=>a.name.localeCompare(b.name,'uk')).map(s=>`
              <label style="display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px; text-transform:none; letter-spacing:0; color:var(--ink); font-weight:400;">
                <input type="checkbox" class="group-member-cb" value="${s.id}" ${g.studentIds.includes(s.id)?'checked':''} style="width:auto;"> ${esc(s.name)}
              </label>`).join('')}
          </div>
        </div>
        <div class="row2">
          <div class="field"><label>Група школи чи особиста</label>
            <select id="f-group-affiliation">
              <option value="school" ${gAff==='school'?'selected':''}>В межах школи</option>
              <option value="private" ${gAff==='private'?'selected':''}>Особиста група (поза школою)</option>
            </select>
          </div>
          <div class="field"><label>Рівень</label>${levelSelectHTML('f-group-level', g.level||'')}</div>
        </div>
        <div class="row3">
          <div class="field"><label>Тривалість (хв)</label><input type="number" id="f-group-duration" value="${esc(g.durationMin||60)}"></div>
          <div class="field"><label>Частота (раз/тиждень)</label><input type="number" id="f-group-freq" value="${esc(g.frequency||1)}"></div>
          <div class="field"><label>Ціна за заняття</label><input type="number" id="f-group-price" value="${g.pricePerLesson!=null? esc(g.pricePerLesson):''}" placeholder="200"></div>
        </div>
        <div style="font-size:11px; color:var(--ink-faint); margin-top:-8px;">Для групи в межах школи ціна — це фіксована оплата за проведене заняття, незалежно від кількості учнів.</div>
        ${fixedScheduleFieldsHTML(g, 'f-group-freq')}
      `, [
        {label:'Видалити групу', action:'submit-del-group', danger:true, id:g.id},
        {label:'Скасувати', action:'close'},
        {label:'Зберегти', action:'submit-edit-group', primary:true, id:g.id}
      ]);
    }

    return '';
  }

  function modalWrap(title, body, actions){
    const btns = actions.map(a=>`<button class="btn ${a.primary?'primary':a.danger?'danger':''}" data-modal-action="${a.action}" data-mid="${a.id||''}" data-mdate="${a.date||''}">${a.label}</button>`).join('');
    return `<div class="overlay" data-overlay>
      <div class="modal">
        <h3>${title}</h3>
        ${body}
        <div class="actions">${btns}</div>
      </div>
    </div>`;
  }

  // ---------- event handling ----------
  function attachHandlers(){
    const app = document.getElementById('app');

    app.querySelectorAll('[data-nav]').forEach(el=>{
      el.addEventListener('click', ()=>{ ui.view = el.dataset.nav; render(); });
    });

    const logoutBtn = app.querySelector('#logout-btn');
    if(logoutBtn) logoutBtn.addEventListener('click', ()=>{
      if(currentUser && currentUser.mode==='name'){
        currentUser = null; loaded = false; data = freshData(); ui.authTab='name'; render();
      } else {
        supabase.auth.signOut();
      }
    });

    const profileBtn = app.querySelector('#profile-btn');
    if(profileBtn) profileBtn.addEventListener('click', ()=>{ ui.modal = {type:'profile', payload:{}}; render(); });

    const helpBtn = app.querySelector('#help-btn');
    if(helpBtn) helpBtn.addEventListener('click', ()=>{ ui.view = 'help'; render(); });

    const weekBtn = app.querySelectorAll('[data-week]');
    weekBtn.forEach(el=>{
      el.addEventListener('click', ()=>{
        const v = el.dataset.week;
        if(v==='0') ui.weekStart = mondayOf(todayISO());
        else ui.weekStart = addDays(ui.weekStart, 7*Number(v));
        render();
      });
    });

    const searchEl = app.querySelector('[data-search]');
    if(searchEl){
      searchEl.addEventListener('input', ()=>{
        ui.search = searchEl.value;
        const grid = document.getElementById('students-grid');
        if(grid){
          grid.innerHTML = studentsGridHTML();
          grid.querySelectorAll('[data-open-student]').forEach(el=>{
            el.addEventListener('click', ()=>{ ui.selectedStudentId = el.dataset.openStudent; ui.view='detail'; render(); });
          });
          grid.querySelectorAll('[data-open-group]').forEach(el=>{
            el.addEventListener('click', ()=>{ ui.selectedGroupId = el.dataset.openGroup; ui.view='group-detail'; render(); });
          });
        }
      });
    }

    app.querySelectorAll('[data-open-student]').forEach(el=>{
      el.addEventListener('click', ()=>{ ui.selectedStudentId = el.dataset.openStudent; ui.view='detail'; render(); });
    });

    app.querySelectorAll('[data-open-group]').forEach(el=>{
      el.addEventListener('click', ()=>{ ui.selectedGroupId = el.dataset.openGroup; ui.view='group-detail'; render(); });
    });

    app.querySelectorAll('[data-open-modal]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const type = el.dataset.openModal;
        const id = el.dataset.id;
        if(type==='add-lesson') ui.modal = {type, payload:{studentId:id||null, groupId:el.dataset.groupId||null, date: ui.view==='schedule'? el.dataset.date: null}};
        else ui.modal = {type, payload:{id}};
        render();
      });
    });

    app.querySelectorAll('[data-hide-hour]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const h = Number(el.dataset.hideHour);
        mutate(()=>{
          if(!data.settings.hiddenHours.includes(h)) data.settings.hiddenHours.push(h);
        });
      });
    });

    app.querySelectorAll('[data-show-all-hours]').forEach(el=>{
      el.addEventListener('click', ()=>{
        mutate(()=>{ data.settings.hiddenHours = []; });
      });
    });

    app.querySelectorAll('[data-add-lesson-at]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        if(e.target.closest('.grid-lesson-chip')) return;
        const [iso, time] = el.dataset.addLessonAt.split('|');
        ui.modal = {type:'add-lesson', payload:{date: iso, time}};
        render();
      });
    });

    app.querySelectorAll('[data-open-lesson]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        ui.modal = {type:'edit-lesson', payload:{id: el.dataset.openLesson}}; render();
      });
    });

    app.querySelectorAll('[data-toggle-done]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const id = el.dataset.toggleDone;
        mutate(()=>{ const l = data.lessons.find(x=>x.id===id); if(l) l.status = (l.status==='done') ? 'planned' : 'done'; });
      });
    });

    app.querySelectorAll('[data-del-student]').forEach(el=>{
      el.addEventListener('click', ()=>{
        if(!confirm('Видалити учня та всю історію занять і оплат?')) return;
        const id = el.dataset.delStudent;
        mutate(()=>{
          data.students = data.students.filter(s=>s.id!==id);
          data.payments = data.payments.filter(p=>p.studentId!==id);
          data.lessons = data.lessons.filter(l=>l.studentId!==id);
          data.groups.forEach(g=>{ g.studentIds = g.studentIds.filter(sid=>sid!==id); });
          data.lessons.forEach(l=>{ if(l.attendance) l.attendance = l.attendance.filter(sid=>sid!==id); });
        });
        ui.view='students';
        render();
      });
    });

    app.querySelectorAll('[data-salary-period]').forEach(el=>{
      el.addEventListener('click', ()=>{ ui.salaryPeriod = el.dataset.salaryPeriod; render(); });
    });

    app.querySelectorAll('[data-salary-nav]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const v = el.dataset.salaryNav;
        if(v==='0'){ ui.salaryAnchor = todayISO(); render(); return; }
        const p = ui.salaryPeriod;
        if(p==='day') ui.salaryAnchor = addDays(ui.salaryAnchor, Number(v));
        else if(p==='week') ui.salaryAnchor = addDays(ui.salaryAnchor, 7*Number(v));
        else if(p==='month'){
          const d = new Date(ui.salaryAnchor+'T00:00:00');
          d.setMonth(d.getMonth()+Number(v));
          ui.salaryAnchor = isoFromDate(d);
        }
        render();
      });
    });

    const customFromEl = app.querySelector('[data-custom-from]');
    if(customFromEl) customFromEl.addEventListener('change', ()=>{ ui.customFrom = customFromEl.value; render(); });
    const customToEl = app.querySelector('[data-custom-to]');
    if(customToEl) customToEl.addEventListener('change', ()=>{ ui.customTo = customToEl.value; render(); });

    app.querySelectorAll('[data-del-adjustment]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const id = el.dataset.delAdjustment;
        mutate(()=>{ data.adjustments = data.adjustments.filter(a=>a.id!==id); });
      });
    });

    app.querySelectorAll('[data-del-payment]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const id = el.dataset.delPayment;
        mutate(()=>{ data.payments = data.payments.filter(p=>p.id!==id); });
      });
    });

    app.querySelectorAll('[data-del-freeze]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const id = el.dataset.delFreeze;
        const studentId = el.dataset.studentId;
        mutate(()=>{ const s = studentById(studentId); if(s) s.freezes = (s.freezes||[]).filter(f=>f.id!==id); });
      });
    });

    app.querySelectorAll('[data-del-lesson]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const id = el.dataset.delLesson;
        mutate(()=>{ data.lessons = data.lessons.filter(l=>l.id!==id); });
      });
    });

    app.querySelectorAll('[data-lesson-status]').forEach(el=>{
      el.addEventListener('change', ()=>{
        const id = el.dataset.lessonStatus;
        mutate(()=>{ const l = data.lessons.find(x=>x.id===id); if(l) l.status = el.value; });
      });
    });

    app.querySelectorAll('[data-lesson-comment]').forEach(el=>{
      el.addEventListener('blur', ()=>{
        const id = el.dataset.lessonComment;
        mutate(()=>{ const l = data.lessons.find(x=>x.id===id); if(l) l.comment = el.value; });
      });
    });

    app.querySelectorAll('[data-lesson-date]').forEach(el=>{
      el.addEventListener('change', ()=>{
        const id = el.dataset.lessonDate;
        if(!el.value) return;
        mutate(()=>{ const l = data.lessons.find(x=>x.id===id); if(l) l.date = el.value; });
      });
    });

    app.querySelectorAll('[data-lesson-time]').forEach(el=>{
      el.addEventListener('change', ()=>{
        const id = el.dataset.lessonTime;
        mutate(()=>{ const l = data.lessons.find(x=>x.id===id); if(l) l.time = el.value; });
      });
    });

    app.querySelectorAll('[data-toggle-attendance]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const [lessonId, studentId] = el.dataset.toggleAttendance.split('|');
        mutate(()=>{
          const l = data.lessons.find(x=>x.id===lessonId);
          if(!l) return;
          if(!l.attendance || !l.attendance.length) l.attendance = lessonGroupMembers(l);
          if(l.attendance.includes(studentId)) l.attendance = l.attendance.filter(id=>id!==studentId);
          else l.attendance.push(studentId);
        });
      });
    });

    app.querySelectorAll('[data-characteristics]').forEach(el=>{
      el.addEventListener('blur', ()=>{
        const id = el.dataset.characteristics;
        mutate(()=>{ const s = studentById(id); if(s) s.characteristics = el.value; });
      });
    });

    const overlay = app.querySelector('[data-overlay]');
    if(overlay){
      overlay.addEventListener('click', (e)=>{ if(e.target===overlay){ ui.modal=null; render(); } });
    }

    const lessonTypeEl = app.querySelector('#f-lesson-type');
    if(lessonTypeEl){
      lessonTypeEl.addEventListener('change', ()=>{
        const indBlock = app.querySelector('#f-individual-block');
        const grpBlock = app.querySelector('#f-group-block');
        if(lessonTypeEl.value==='group'){ indBlock.style.display='none'; grpBlock.style.display=''; }
        else { indBlock.style.display=''; grpBlock.style.display='none'; }
      });
    }

    const learningTypeEl = app.querySelector('#f-learning-type');
    if(learningTypeEl){
      learningTypeEl.addEventListener('change', ()=>{
        const block = app.querySelector('#f-group-pick-block');
        block.style.display = learningTypeEl.value==='individual' ? 'none' : '';
      });
    }

    const fixedEl = app.querySelector('#f-fixed');
    if(fixedEl){
      fixedEl.addEventListener('change', ()=>{
        app.querySelector('#f-fixed-block').style.display = fixedEl.checked? '' : 'none';
        updateFixedDayHint(app);
      });
    }
    const fixedBlockEl = app.querySelector('#f-fixed-block');
    if(fixedBlockEl){
      const freqFieldId = fixedBlockEl.dataset.freqField;
      const freqEl = freqFieldId? app.querySelector('#'+freqFieldId) : null;
      app.querySelectorAll('.fixed-day-cb').forEach(cb=> cb.addEventListener('change', ()=> updateFixedDayHint(app)));
      if(freqEl) freqEl.addEventListener('input', ()=> updateFixedDayHint(app));
      updateFixedDayHint(app);
    }

    const repeatEl = app.querySelector('#f-repeat');
    if(repeatEl){
      repeatEl.addEventListener('change', ()=>{
        app.querySelector('#f-repeat-block').style.display = repeatEl.checked? '' : 'none';
      });
    }

    if(ui.modal && ui.modal.type==='profile'){
      const themeLightBtn = app.querySelector('#theme-light-btn');
      const themeDarkBtn = app.querySelector('#theme-dark-btn');
      if(themeLightBtn) themeLightBtn.addEventListener('click', ()=>{ mutate(()=>{ data.settings.theme = 'light'; }); ui.modal={type:'profile',payload:{}}; render(); });
      if(themeDarkBtn) themeDarkBtn.addEventListener('click', ()=>{ mutate(()=>{ data.settings.theme = 'dark'; }); ui.modal={type:'profile',payload:{}}; render(); });

      const secureBtn = app.querySelector('#secure-account-btn');
      if(secureBtn){
        secureBtn.addEventListener('click', async ()=>{
          const email = app.querySelector('#f-secure-email').value.trim();
          const pass = app.querySelector('#f-secure-pass').value;
          if(!email || !pass){ ui.profileError = "Вкажіть email і пароль"; render(); return; }
          ui.profileBusy = true; ui.profileError = null; render();
          try{
            const oldKey = currentUser.key;
            const { data: signUpData, error } = await supabase.auth.signUp({
              email, password: pass,
              options: { data: { migrateFromName: oldKey } }
            });
            if(error) throw error;
            const newUser = signUpData.user;
            if(signUpData.session && newUser){
              // email confirmation not required — session is active right away, migrate now
              const { error: upsertErr } = await supabase.from('user_data').upsert({ user_id: newUser.id, data });
              if(upsertErr) throw upsertErr;
              try{ await supabase.from('name_accounts').delete().eq('name', oldKey); }catch(e){ /* best effort */ }
              try{ await supabase.auth.updateUser({ data: { migrateFromName: null } }); }catch(e){}
              ui.profileBusy = false;
              alert('Готово! Ваш акаунт тепер захищено паролем. Наступного разу входьте через вкладку Email.');
              currentUser = { mode:'email', id: newUser.id, email: newUser.email };
              ui.modal = null;
              loadData();
            } else {
              // email confirmation required — data will migrate automatically on first confirmed login
              ui.profileBusy = false;
              alert('Перевірте пошту та підтвердіть email за посиланням. Після підтвердження увійдіть через вкладку Email — ваші дані перенесуться автоматично.');
              ui.modal = null;
              render();
            }
          }catch(e){
            ui.profileBusy = false;
            ui.profileError = translateAuthError(e.message);
            render();
          }
        });
      }

      const changePassBtn = app.querySelector('#change-pass-btn');
      if(changePassBtn){
        changePassBtn.addEventListener('click', async ()=>{
          const pass = app.querySelector('#f-new-pass').value;
          if(!pass || pass.length<6){ ui.profileError = "Пароль має містити щонайменше 6 символів"; render(); return; }
          ui.profileBusy = true; ui.profileError = null; render();
          try{
            const { error } = await supabase.auth.updateUser({ password: pass });
            if(error) throw error;
            ui.profileBusy = false;
            ui.modal = null;
            alert('Пароль змінено.');
            render();
          }catch(e){
            ui.profileBusy = false;
            ui.profileError = translateAuthError(e.message);
            render();
          }
        });
      }

      const deleteAccountBtn = app.querySelector('#delete-account-btn');
      if(deleteAccountBtn){
        deleteAccountBtn.addEventListener('click', async ()=>{
          const sure = confirm('Ви точно хочете видалити акаунт? Усі учні, групи, оплати та розклад зникнуть безповоротно.');
          if(!sure) return;
          const typed = prompt('Щоб підтвердити, введіть слово ВИДАЛИТИ:');
          if(typed !== 'ВИДАЛИТИ'){ alert('Скасовано — текст не збігається.'); return; }
          ui.profileBusy = true; ui.profileError = null; render();
          try{
            if(currentUser.mode==='name'){
              const { error } = await supabase.from('name_accounts').delete().eq('name', currentUser.key);
              if(error) throw error;
              ui.profileBusy = false;
              currentUser = null; loaded = false; data = freshData(); ui.authTab='name'; ui.modal=null;
              alert('Акаунт і всі дані видалено.');
              render();
            } else {
              const { error } = await supabase.from('user_data').delete().eq('user_id', currentUser.id);
              if(error) throw error;
              ui.profileBusy = false;
              ui.modal = null;
              alert('Дані видалено. Зараз вийдемо з акаунту.');
              await supabase.auth.signOut();
            }
          }catch(e){
            ui.profileBusy = false;
            ui.profileError = translateAuthError(e.message);
            render();
          }
        });
      }
    }

    if(ui.modal && ui.modal.type==='add-payment'){
      const amountEl = app.querySelector('#f-amount');
      const lessonsEl = app.querySelector('#f-lessons');
      const priceEl = app.querySelector('#f-price');
      const dateEl = app.querySelector('#f-date');
      const untilEl = app.querySelector('#f-until');
      const stu = studentById(ui.modal.payload.id);
      let editOrder = [];
      let untilTouched = false;
      function noteEdit(field){
        editOrder = editOrder.filter(f=>f!==field);
        editOrder.push(field);
        if(editOrder.length>2) editOrder.shift();
      }
      function updateUntil(){
        if(untilTouched) return;
        const freq = stu && Number(stu.frequency);
        const lessons = parseFloat(lessonsEl.value);
        if(freq>0 && lessons>0){
          const days = Math.ceil((lessons/freq)*7);
          untilEl.value = addDays(dateEl.value||todayISO(), days);
        }
      }
      function recalc(field){
        noteEdit(field);
        if(editOrder.length>=2){
          const target = ['amount','lessons','price'].find(f=> !editOrder.includes(f));
          const amount = parseFloat(amountEl.value);
          const lessons = parseFloat(lessonsEl.value);
          const price = parseFloat(priceEl.value);
          if(target==='amount' && lessons>0 && price>0) amountEl.value = (lessons*price).toFixed(0);
          else if(target==='lessons' && amount>0 && price>0) lessonsEl.value = (Math.round((amount/price)*10)/10);
          else if(target==='price' && amount>0 && lessons>0) priceEl.value = (Math.round((amount/lessons)*100)/100);
        }
        updateUntil();
      }
      amountEl.addEventListener('input', ()=> recalc('amount'));
      lessonsEl.addEventListener('input', ()=> recalc('lessons'));
      priceEl.addEventListener('input', ()=> recalc('price'));
      dateEl.addEventListener('input', updateUntil);
      untilEl.addEventListener('input', ()=>{ untilTouched = true; });
    }

    app.querySelectorAll('[data-modal-action]').forEach(el=>{
      el.addEventListener('click', ()=> handleModalAction(el.dataset.modalAction, el.dataset.mid, el.dataset.mdate));
    });
  }

  function handleModalAction(action, mid, mdate){
    const app = document.getElementById('app');
    if(action==='close'){ ui.modal=null; render(); return; }

    if(action==='submit-save-profile-name'){
      const nameEl = app.querySelector('#f-profile-name');
      const newName = nameEl? nameEl.value.trim() : '';
      mutate(()=>{ data.profileName = newName; });
      ui.modal=null; render(); return;
    }

    if(action==='submit-add-student'){
      const name = app.querySelector('#f-name').value.trim();
      if(!name){ alert("Вкажіть ім'я учня"); return; }
      const learningType = app.querySelector('#f-learning-type').value;
      const groupSel = app.querySelector('#f-learning-group');
      const groupId = learningType!=='individual' && groupSel? groupSel.value : null;
      if(learningType!=='individual' && !groupId){ alert('Оберіть групу'); return; }
      const affiliation = app.querySelector('#f-affiliation').value;
      const level = app.querySelector('#f-level').value;
      const ageCategory = app.querySelector('#f-age-category').value;
      const birthDate = app.querySelector('#f-birthdate').value || null;
      const durationMin = Number(app.querySelector('#f-duration').value)||null;
      const fixed = readFixedScheduleInput(app, 'f-freq');
      if(fixed===false) return;
      mutate(()=>{
        const newId = uid();
        data.students.push({
          id: newId, name,
          contact: app.querySelector('#f-contact').value.trim(),
          parentContact: app.querySelector('#f-parent-contact').value.trim(),
          durationMin,
          frequency: Number(app.querySelector('#f-freq').value)||null,
          pricePerLesson: app.querySelector('#f-price').value!==''? Number(app.querySelector('#f-price').value) : null,
          learningType,
          affiliation,
          level,
          ageCategory,
          birthDate,
          freezes: [],
          fixedSchedule: fixed? {days:fixed.days} : null,
          characteristics: app.querySelector('#f-char').value.trim(),
          createdAt: todayISO()
        });
        if(groupId){
          const g = groupById(groupId);
          if(g && !g.studentIds.includes(newId)) g.studentIds.push(newId);
        }
        if(fixed){
          data.lessons.push(...generateFixedLessons({studentId:newId, days:fixed.days, weeks:fixed.weeks, durationMin}));
        }
      });
      ui.modal=null; render(); return;
    }

    if(action==='submit-edit-student'){
      const s = studentById(mid);
      const name = app.querySelector('#f-name').value.trim();
      if(!name){ alert("Вкажіть ім'я учня"); return; }
      const learningType = app.querySelector('#f-learning-type').value;
      const groupSel = app.querySelector('#f-learning-group');
      const groupId = learningType!=='individual' && groupSel? groupSel.value : null;
      if(learningType!=='individual' && !groupId){ alert('Оберіть групу'); return; }
      const affiliation = app.querySelector('#f-affiliation').value;
      const level = app.querySelector('#f-level').value;
      const ageCategory = app.querySelector('#f-age-category').value;
      const birthDate = app.querySelector('#f-birthdate').value || null;
      const durationMin = Number(app.querySelector('#f-duration').value)||null;
      const fixed = readFixedScheduleInput(app, 'f-freq');
      if(fixed===false) return;
      mutate(()=>{
        s.name = name;
        s.contact = app.querySelector('#f-contact').value.trim();
        s.parentContact = app.querySelector('#f-parent-contact').value.trim();
        s.durationMin = durationMin;
        s.frequency = Number(app.querySelector('#f-freq').value)||null;
        s.pricePerLesson = app.querySelector('#f-price').value!==''? Number(app.querySelector('#f-price').value) : null;
        s.learningType = learningType;
        s.affiliation = affiliation;
        s.level = level;
        s.ageCategory = ageCategory;
        s.birthDate = birthDate;
        if(groupId){
          const g = groupById(groupId);
          if(g && !g.studentIds.includes(s.id)) g.studentIds.push(s.id);
        }
        if(fixed){
          s.fixedSchedule = {days:fixed.days};
          data.lessons.push(...generateFixedLessons({studentId:s.id, days:fixed.days, weeks:fixed.weeks, durationMin}));
        }
      });
      ui.modal=null; render(); return;
    }

    if(action==='submit-add-payment'){
      const amount = app.querySelector('#f-amount').value;
      const lessonsCount = app.querySelector('#f-lessons').value;
      const price = app.querySelector('#f-price').value;
      mutate(()=>{
        data.payments.push({
          id: uid(), studentId: mid,
          date: app.querySelector('#f-date').value || todayISO(),
          amount: Number(amount)||0,
          lessonsCount: Number(lessonsCount)||0,
          pricePerLesson: price!==''? Number(price) : null,
          validUntil: app.querySelector('#f-until').value || null
        });
      });
      ui.modal=null; render(); return;
    }

    if(action==='submit-add-freeze'){
      const start = app.querySelector('#f-start').value;
      const end = app.querySelector('#f-end').value;
      if(!start || !end){ alert('Вкажіть обидві дати'); return; }
      if(end < start){ alert('Дата закінчення раніша за дату початку'); return; }
      const note = app.querySelector('#f-note').value.trim();
      let removedCount = 0;
      mutate(()=>{
        const s = studentById(mid);
        if(!s.freezes) s.freezes = [];
        s.freezes.push({ id: uid(), start, end, note });
        // remove this student's own planned individual lessons that fall inside the freeze — group lessons are never touched
        const before = data.lessons.length;
        data.lessons = data.lessons.filter(l=> !(l.studentId===mid && !l.groupId && l.status==='planned' && l.date>=start && l.date<=end));
        removedCount = before - data.lessons.length;
      });
      ui.modal=null; render();
      if(removedCount>0) alert(`Заморозку додано. З розкладу прибрано індивідуальних занять: ${removedCount}.`);
      return;
    }

    if(action==='submit-add-lesson'){
      const typeEl = app.querySelector('#f-lesson-type');
      const isGroup = typeEl && typeEl.value==='group';
      const preGroupId = ui.modal && ui.modal.payload && ui.modal.payload.groupId;
      let studentId = null, groupId = null;
      if(mid){
        studentId = mid;
      } else if(preGroupId){
        groupId = preGroupId;
      } else if(isGroup){
        const groupSel = app.querySelector('#f-group');
        groupId = groupSel? groupSel.value : null;
        if(!groupId){ alert('Оберіть групу'); return; }
      } else {
        const studentSel = app.querySelector('#f-student');
        studentId = studentSel? studentSel.value : null;
        if(!studentId){ alert('Оберіть учня'); return; }
      }
      const attendance = groupId? (groupById(groupId)? groupById(groupId).studentIds.slice() : []) : null;
      const repeatEl = app.querySelector('#f-repeat');
      const weeks = (repeatEl && repeatEl.checked) ? Math.max(1, Math.min(52, Number(app.querySelector('#f-repeat-weeks').value)||1)) : 1;
      const baseDate = app.querySelector('#f-date').value || todayISO();
      const time = app.querySelector('#f-time').value || '';
      const durationMin = Number(app.querySelector('#f-duration').value)||null;
      const comment = app.querySelector('#f-comment').value.trim();
      const student = (!groupId && studentId) ? studentById(studentId) : null;
      mutate(()=>{
        for(let i=0;i<weeks;i++){
          const date = addDays(baseDate, i*7);
          if(weeks>1 && student && isDateFrozen(student, date)) continue; // recurring individual lessons skip frozen dates; single ad-hoc adds and groups are unaffected
          data.lessons.push({
            id: uid(), studentId, groupId,
            attendance: attendance? attendance.slice() : null,
            date,
            time, durationMin, comment,
            status: 'planned'
          });
        }
      });
      ui.modal=null; render(); return;
    }

    if(action==='submit-edit-lesson'){
      const l = data.lessons.find(x=>x.id===mid);
      mutate(()=>{
        l.date = app.querySelector('#f-date').value || l.date;
        l.time = app.querySelector('#f-time').value || '';
        l.status = app.querySelector('#f-status').value;
        l.durationMin = Number(app.querySelector('#f-duration').value)||null;
        l.comment = app.querySelector('#f-comment').value.trim();
      });
      ui.modal=null; render(); return;
    }

    if(action==='submit-del-lesson'){
      mutate(()=>{ data.lessons = data.lessons.filter(l=>l.id!==mid); });
      ui.modal=null; render(); return;
    }

    if(action==='submit-add-adjustment'){
      const date = app.querySelector('#f-date').value || todayISO();
      const amount = Number(app.querySelector('#f-amount').value)||0;
      const note = app.querySelector('#f-note').value.trim();
      mutate(()=>{ data.adjustments.push({ id: uid(), date, amount, note }); });
      ui.modal=null; render(); return;
    }

    if(action==='submit-add-group'){
      const name = app.querySelector('#f-group-name').value.trim();
      if(!name){ alert('Вкажіть назву групи'); return; }
      const studentIds = Array.from(app.querySelectorAll('.group-member-cb:checked')).map(el=>el.value);
      const affiliation = app.querySelector('#f-group-affiliation').value;
      const level = app.querySelector('#f-group-level').value;
      const durationMin = Number(app.querySelector('#f-group-duration').value)||null;
      const frequency = Number(app.querySelector('#f-group-freq').value)||null;
      const pricePerLesson = app.querySelector('#f-group-price').value!==''? Number(app.querySelector('#f-group-price').value) : null;
      const fixed = readFixedScheduleInput(app, 'f-group-freq');
      if(fixed===false) return;
      mutate(()=>{
        const newId = uid();
        data.groups.push({ id: newId, name, studentIds, affiliation, level, durationMin, frequency, pricePerLesson, fixedSchedule: fixed? {days:fixed.days} : null });
        if(fixed){
          data.lessons.push(...generateFixedLessons({groupId:newId, days:fixed.days, weeks:fixed.weeks, durationMin}));
        }
      });
      ui.modal=null; render(); return;
    }

    if(action==='submit-edit-group'){
      const g = groupById(mid);
      const name = app.querySelector('#f-group-name').value.trim();
      if(!name){ alert('Вкажіть назву групи'); return; }
      const studentIds = Array.from(app.querySelectorAll('.group-member-cb:checked')).map(el=>el.value);
      const affiliation = app.querySelector('#f-group-affiliation').value;
      const level = app.querySelector('#f-group-level').value;
      const durationMin = Number(app.querySelector('#f-group-duration').value)||null;
      const frequency = Number(app.querySelector('#f-group-freq').value)||null;
      const pricePerLesson = app.querySelector('#f-group-price').value!==''? Number(app.querySelector('#f-group-price').value) : null;
      const fixed = readFixedScheduleInput(app, 'f-group-freq');
      if(fixed===false) return;
      mutate(()=>{
        g.name = name; g.studentIds = studentIds; g.affiliation = affiliation; g.level = level;
        g.durationMin = durationMin; g.frequency = frequency; g.pricePerLesson = pricePerLesson;
        if(fixed){
          g.fixedSchedule = {days:fixed.days};
          data.lessons.push(...generateFixedLessons({groupId:g.id, days:fixed.days, weeks:fixed.weeks, durationMin}));
        }
      });
      ui.modal=null; render(); return;
    }

    if(action==='submit-del-group'){
      if(!confirm('Видалити групу? Заняття, вже прив’язані до неї, залишаться в історії, але без прив’язки до групи.')) return;
      mutate(()=>{
        data.groups = data.groups.filter(g=>g.id!==mid);
        data.lessons.forEach(l=>{ if(l.groupId===mid) l.groupId = null; });
      });
      ui.modal=null; render(); return;
    }
  }

  async function loadDataWithPossibleMigration(session){
    const migrateKey = session.user.user_metadata && session.user.user_metadata.migrateFromName;
    if(migrateKey){
      try{
        const { data: row } = await supabase.from('name_accounts').select('data').eq('name', migrateKey).maybeSingle();
        if(row && row.data){
          await supabase.from('user_data').upsert({ user_id: session.user.id, data: row.data });
          await supabase.from('name_accounts').delete().eq('name', migrateKey);
        }
        await supabase.auth.updateUser({ data: { migrateFromName: null } });
      }catch(e){ console.error('migration error', e); }
    }
    loadData();
  }

  supabase.auth.onAuthStateChange((event, session)=>{
    if(currentUser && currentUser.mode==='name') return; // name-based session is independent of Supabase Auth
    currentUser = session? { mode:'email', id: session.user.id, email: session.user.email } : null;
    if(currentUser){ loadDataWithPossibleMigration(session); }
    else { loaded = false; data = freshData(); render(); }
  });
})();
</script>

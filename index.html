<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Журнал викладача</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F1E4;
    --paper-2:#EFE7D3;
    --ink:#22281F;
    --ink-soft:#655E4C;
    --ink-faint:#948C77;
    --accent:#3F6B54;
    --accent-dark:#2E5040;
    --accent-soft:#DCE7DC;
    --warn:#AE4A2C;
    --warn-soft:#F3DFD2;
    --amber:#A9781F;
    --amber-soft:#F1E4C4;
    --group:#6B5B95;
    --group-soft:#E4DFF0;
    --ind-school:#b7e1cd;
    --ind-private:#8fd0ae;
    --grp-school:#bae8ff;
    --grp-private:#82cdf2;
    --line:#D9CFB4;
    --card:#FFFDF7;
    --shadow: 0 1px 2px rgba(34,40,31,0.07), 0 6px 16px rgba(34,40,31,0.06);
    --radius: 10px;
  }
  body[data-theme="dark"]{
    --paper:#1E1B16;
    --paper-2:#2A251E;
    --ink:#EDE7D9;
    --ink-soft:#C9C0AC;
    --ink-faint:#93897A;
    --accent:#5B9179;
    --accent-dark:#7FB89A;
    --accent-soft:#2C3F35;
    --warn:#E08363;
    --warn-soft:#40291F;
    --amber:#D9A94A;
    --amber-soft:#3D3220;
    --group:#B39DDB;
    --group-soft:#332A44;
    --line:#3D362B;
    --card:#26221C;
    --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 6px 16px rgba(0,0,0,0.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      linear-gradient(var(--paper), var(--paper));
    background-color:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    font-size:14.5px;
    line-height:1.45;
    min-height:100vh;
    transition: background-color .2s, color .2s;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(transparent, transparent 34px, rgba(63,107,84,0.045) 35px);
    pointer-events:none;
    z-index:0;
  }
  #app{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:24px 20px 80px;}

  h1,h2,h3{font-family:'Fraunces',serif; margin:0; letter-spacing:-0.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  /* pastel lesson-type surfaces keep dark text in both themes, since the accent hex values are fixed */
  .grid-lesson-chip, .grid-lesson-chip .t{color:#1c2b21 !important;}

  /* header */
  .topbar{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:12px;}
  .brand{display:flex; align-items:baseline; gap:10px;}
  .brand .mark{
    font-family:'Fraunces',serif; font-weight:700; font-size:15px; color:var(--paper);
    background:var(--accent-dark); width:30px; height:30px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center; letter-spacing:0;
  }
  .brand h1{font-size:22px; font-weight:600; color:var(--ink);}
  .brand .sub{color:var(--ink-faint); font-size:12.5px;}

  nav.tabs{display:flex; gap:4px; background:var(--paper-2); padding:4px; border-radius:999px; border:1px solid var(--line);}
  nav.tabs button{
    border:none; background:transparent; padding:7px 16px; border-radius:999px;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer;
    transition:.15s;
  }
  nav.tabs button.active{background:var(--accent); color:#fff;}
  nav.tabs button:hover:not(.active){color:var(--ink);}

  .btn{
    border:1px solid var(--line); background:var(--card); color:var(--ink);
    padding:8px 14px; border-radius:8px; font-family:'Inter'; font-size:13px; font-weight:600;
    cursor:pointer; transition:.15s; box-shadow:var(--shadow);
  }
  .btn:hover{border-color:var(--accent); color:var(--accent-dark);}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn.primary:hover{background:var(--accent-dark); color:#fff;}
  .btn.danger{color:var(--warn);}
  .btn.danger:hover{border-color:var(--warn);}
  .btn.small{padding:4px 10px; font-size:12px; box-shadow:none;}
  .btn.ghost{background:transparent; box-shadow:none; border-color:transparent; color:var(--ink-soft);}
  .btn.ghost:hover{background:var(--paper-2); color:var(--ink);}

  input,select,textarea{
    font-family:'Inter',sans-serif; font-size:13.5px; color:var(--ink);
    border:1px solid var(--line); border-radius:7px; padding:8px 10px; background:var(--card);
    width:100%;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-soft); border-color:var(--accent);}
  label{font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); font-weight:600; display:block; margin-bottom:4px;}
  .field{margin-bottom:12px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .row3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}

  /* schedule */
  .week-nav{display:flex; align-items:center; gap:10px; margin-bottom:16px;}
  .week-nav .label{font-family:'Fraunces',serif; font-size:16px; font-weight:600;}
  .hidden-hours-bar{font-size:12px; color:var(--ink-faint); margin-bottom:10px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .time-grid{display:grid; grid-template-columns:56px repeat(7,1fr); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--card); box-shadow:var(--shadow);}
  .tg-corner{background:var(--paper-2); border-bottom:1px solid var(--line); border-right:1px solid var(--line);}
  .tg-dayhead{background:var(--paper-2); border-bottom:1px solid var(--line); border-right:1px solid var(--line); text-align:center; padding:8px 4px; transition:.15s;}
  .tg-dayhead:last-child, .tg-hour:last-child{border-right:none;}
  .tg-dayhead.today{background:var(--accent); box-shadow:inset 0 -2px 0 var(--accent-dark);}
  .tg-dayhead.today .dname, .tg-dayhead.today .dnum{color:#fff;}
  .tg-dayhead.past{background:var(--paper-2); opacity:.55;}
  .tg-dayhead .dname{font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); font-weight:600;}
  .tg-dayhead .dnum{font-family:'Fraunces',serif; font-size:15px; font-weight:600;}
  .tg-hourlabel{border-right:1px solid var(--line); border-bottom:1px solid var(--line); font-size:10.5px; color:var(--ink-faint); text-align:right; padding:5px 6px; font-family:'IBM Plex Mono'; cursor:pointer; position:relative; user-select:none;}
  .tg-hourlabel:hover{background:var(--warn-soft); color:var(--warn);}
  .tg-hour{border-right:1px solid var(--line); border-bottom:1px solid var(--line); min-height:40px; padding:2px; display:flex; flex-direction:column; gap:2px; cursor:pointer; transition:.15s;}
  .tg-hour.today{background:var(--accent-soft);}
  .tg-hour.past{background:var(--paper-2); opacity:.6;}
  .tg-hour.future:hover, .tg-hour.today:hover{background:var(--accent-soft); filter:brightness(0.97);}
  .grid-lesson-chip{
    background:var(--ind-school); border-radius:5px; padding:3px 6px; font-size:11px; line-height:1.25; cursor:pointer; color:var(--ink);
    position:relative; padding-right:20px;
  }
  .grid-lesson-chip.private{background:var(--ind-private);}
  .grid-lesson-chip.group{background:var(--grp-school);}
  .grid-lesson-chip.group.private{background:var(--grp-private);}
  .grid-lesson-chip.done{opacity:.5;}
  .grid-lesson-chip.cancelled{opacity:.4; text-decoration:line-through;}
  .grid-lesson-chip .t{font-family:'IBM Plex Mono'; font-weight:700; font-size:10.5px;}
  .chip-check{
    position:absolute; top:2px; right:2px; width:15px; height:15px; border-radius:50%;
    border:1.5px solid rgba(34,40,31,0.35); background:rgba(255,255,255,0.55); color:transparent; font-size:10px; line-height:12px; padding:0; cursor:pointer; text-align:center; font-weight:700;
  }
  .chip-check.checked{background:#3F9142; border-color:#3F9142; color:#fff;}
  .chip-check:hover{border-color:#3F9142;}
  .unscheduled-row{margin-bottom:14px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; font-size:12px; color:var(--ink-faint);}
  .group-badge{font-size:10.5px; padding:2px 7px; border-radius:999px; background:var(--group-soft); color:var(--group); font-weight:600;}
  .attend-list{display:flex; flex-wrap:wrap; gap:5px;}
  .attend-chip{
    font-size:11px; padding:3px 8px; border-radius:999px; cursor:pointer; font-weight:600; border:1px solid transparent; transition:.15s;
  }
  .attend-chip.present{background:var(--accent-soft); color:var(--accent-dark);}
  .attend-chip.absent{background:var(--paper-2); color:var(--ink-faint); text-decoration:line-through; opacity:.7;}
  .attend-chip:hover{border-color:var(--accent);}

  /* students grid */
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:10px; flex-wrap:wrap;}
  .search{max-width:240px;}
  .students-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px;}
  .scard{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);
    padding:16px; cursor:pointer; position:relative; overflow:hidden; transition:.15s;
  }
  .scard:hover{transform:translateY(-2px); border-color:var(--accent);}
  .scard::before{
    content:""; position:absolute; top:0; left:16px; width:34px; height:8px; background:var(--ind-school);
    border-radius:0 0 4px 4px;
  }
  .scard.aff-private::before{background:var(--ind-private);}
  .scard .sname{font-family:'Fraunces',serif; font-size:17px; font-weight:600; margin-top:6px;}
  .scard .meta{color:var(--ink-faint); font-size:12px; margin-top:2px;}
  .scard .aff-tag{font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-faint); font-weight:600;}
  .scard .balance-row{display:flex; align-items:baseline; gap:6px; margin-top:12px;}
  .scard .balance{font-family:'IBM Plex Mono'; font-size:26px; font-weight:600;}
  .scard .balance-label{font-size:11px; color:var(--ink-faint);}
  .dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px;}
  .dot.ok{background:var(--accent);}
  .dot.amber{background:var(--amber);}
  .dot.warn{background:var(--warn);}
  .scard .lastrow{margin-top:8px; font-size:12px; color:var(--ink-soft); border-top:1px dashed var(--line); padding-top:8px;}
  .scard.group-card{background:linear-gradient(180deg, var(--grp-school) 0%, var(--card) 60px);}
  .scard.group-card::before{background:var(--grp-school);}
  .scard.group-card.aff-private{background:linear-gradient(180deg, var(--grp-private) 0%, var(--card) 60px);}
  .scard.group-card.aff-private::before{background:var(--grp-private);}
  .scard.group-card:hover{border-color:var(--group);}
  .scard.group-card .sname{color:var(--group);}

  .empty{color:var(--ink-faint); font-size:13px; padding:30px 0; text-align:center;}
  .panel p{margin:0 0 10px; font-size:13.5px; line-height:1.5; color:var(--ink-soft);}
  .panel ul{margin:0 0 4px; padding-left:20px;}
  .panel li{margin-bottom:8px; font-size:13.5px; line-height:1.5; color:var(--ink-soft);}
  .panel li b{color:var(--ink); font-weight:600;}

  /* student detail */
  .detail-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; gap:12px; flex-wrap:wrap;}
  .detail-title{display:flex; align-items:center; gap:12px;}
  .avatar{width:44px;height:44px;border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Fraunces'; font-weight:700; font-size:18px;}
  .detail-title h2{font-size:24px;}
  .detail-title .contact{color:var(--ink-faint); font-size:12.5px;}

  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:14px;}
  .panel h3{font-size:14px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;}
  .panel h3 .btn{font-size:11.5px;}
  .grid2{display:grid; grid-template-columns:1.1fr 1fr; gap:14px; align-items:start;}
  @media (max-width:820px){.grid2{grid-template-columns:1fr;} .row3{grid-template-columns:1fr;} .schedule-scroll{overflow-x:auto;} .time-grid{min-width:640px;}}

  .stat-strip{display:flex; gap:18px; flex-wrap:wrap; margin-bottom:10px;}
  .stat{min-width:100px;}
  .stat .v{font-family:'IBM Plex Mono'; font-size:22px; font-weight:600;}
  .stat .l{font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.04em;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  table th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-faint); font-weight:600; padding:6px 8px; border-bottom:1px solid var(--line);}
  table td{padding:7px 8px; border-bottom:1px solid var(--paper-2); vertical-align:top;}
  table tr:last-child td{border-bottom:none;}
  .status-badge{font-size:11px; padding:2px 8px; border-radius:999px; font-weight:600;}
  .status-badge.planned{background:var(--accent-soft); color:var(--accent-dark);}
  .status-badge.done{background:var(--paper-2); color:var(--ink-soft);}
  .status-badge.cancelled{background:var(--warn-soft); color:var(--warn);}
  .comment-input{font-size:12.5px; padding:5px 7px;}
  textarea.characteristics{min-height:90px; resize:vertical;}

  /* modal */
  .overlay{position:fixed; inset:0; background:rgba(34,40,31,0.4); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
  .modal{background:var(--paper); border:1px solid var(--line); border-radius:12px; width:100%; max-width:420px; padding:20px; box-shadow:0 12px 40px rgba(0,0,0,0.25); max-height:88vh; overflow:auto;}
  .modal h3{font-size:17px; margin-bottom:14px;}
  .modal .actions{display:flex; justify-content:flex-end; gap:8px; margin-top:16px;}

  .icon-btn{background:none; border:none; cursor:pointer; color:var(--ink-faint); font-size:14px; padding:2px 4px;}
  .icon-btn:hover{color:var(--warn);}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
  // ====== SUPABASE SETUP ======
  // 1. Створіть проєкт на https://supabase.com (безкоштовно, без картки)
  // 2. Settings → API → скопіюйте "Project URL" і "anon public" ключ сюди:
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://lbkhxrmswsjhqtjfmqox.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxia2h4cm1zd3NqaHF0amZtcW94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyOTA1NzEsImV4cCI6MjA5OTg2NjU3MX0.2JYeGPReSmdp_CSYSmNI1gDWV5KUCrrBMgUDCkwbhvg";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  // ====== END SUPABASE SETUP ======

(function(){
  let currentUser = null;
  let data = { students: [], payments: [], lessons: [], adjustments: [], groups: [], profileName: '', settings: { rateMode:'perLesson', rateValue:200, hiddenHours: [], theme:'light' } };
  let ui = {
    view: 'schedule',
    selectedStudentId: null,
    selectedGroupId: null,
    weekStart: mondayOf(todayISO()),
    search: '',
    salaryPeriod: 'month',
    salaryAnchor: todayISO(),
    modal: null, // {type, payload}
    authMode: 'login',
    authError: null,
    authBusy: false,
    profileError: null,
    profileBusy: false
  };
  let loaded = false;

  // ---------- utils ----------
  function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
  function todayISO(){ const d=new Date(); return isoFromDate(d); }
  function isoFromDate(d){ const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
  function mondayOf(iso){
    const d = new Date(iso+'T00:00:00');
    const day = d.getDay(); // 0=Sun
    const diff = (day===0? -6 : 1-day);
    d.setDate(d.getDate()+diff);
    return isoFromDate(d);
  }
  function addDays(iso, n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return isoFromDate(d); }
  function daysBetween(a,b){ return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00'))/86400000); }
  function nextWeekday(fromISO, weekday){
    const d = new Date(fromISO+'T00:00:00');
    const diff = (weekday - d.getDay() + 7) % 7;
    d.setDate(d.getDate()+diff);
    return isoFromDate(d);
  }
  function isDateFrozen(student, dateISO){
    return !!(student && student.freezes && student.freezes.some(f=> f.start && f.end && f.start<=dateISO && dateISO<=f.end));
  }
  function generateFixedLessons({studentId, groupId, days, weeks, durationMin}){
    const attendance = groupId ? (groupById(groupId) ? groupById(groupId).studentIds.slice() : []) : null;
    const student = (!groupId && studentId) ? studentById(studentId) : null;
    const created = [];
    days.forEach(({weekday, time})=>{
      const start = nextWeekday(todayISO(), weekday);
      for(let i=0;i<weeks;i++){
        const date = addDays(start, i*7);
        if(student && isDateFrozen(student, date)) continue; // skip lessons that fall inside a freeze — groups are unaffected
        created.push({
          id: uid(), studentId: studentId||null, groupId: groupId||null,
          attendance: attendance? attendance.slice() : null,
          date, time, durationMin: durationMin||null,
          status: 'planned', comment: ''
        });
      }
    });
    return created;
  }
  // returns { days: [{weekday,time}], weeks } or null (unchecked) or false (validation failed — caller should abort)
  function readFixedScheduleInput(app, freqFieldId){
    const fixedEl = app.querySelector('#f-fixed');
    if(!fixedEl || !fixedEl.checked) return null;
    const dayCbs = Array.from(app.querySelectorAll('.fixed-day-cb:checked'));
    if(dayCbs.length===0){ alert('Оберіть хоча б один день тижня для фіксованого заняття'); return false; }
    const freqEl = freqFieldId? app.querySelector('#'+freqFieldId) : null;
    const freq = freqEl? Number(freqEl.value)||0 : 0;
    if(freq>0 && dayCbs.length!==freq){
      alert(`Частота занять — ${freq} р/тиждень, а обрано днів: ${dayCbs.length}. Оберіть рівно ${freq} ${freq===1?'день':'дні(в)'} тижня, щоб фіксований розклад збігався з частотою.`);
      return false;
    }
    const days = dayCbs.map(cb=>{
      const weekday = Number(cb.value);
      const timeEl = app.querySelector(`.fixed-day-time[data-weekday="${weekday}"]`);
      return { weekday, time: (timeEl && timeEl.value) || '15:00' };
    });
    const weeks = Math.max(1, Math.min(52, Number(app.querySelector('#f-fixed-weeks').value)||26));
    return { days, weeks };
  }
  function effectiveTariffEnd(s, payment){
    if(!payment || !payment.validUntil) return null;
    const freezeDays = (s.freezes||[])
      .filter(f=> f.start && f.end && f.start >= payment.date)
      .reduce((sum,f)=> sum + Math.max(0, daysBetween(f.start,f.end)+1), 0);
    return freezeDays>0 ? addDays(payment.validUntil, freezeDays) : payment.validUntil;
  }
  function formatUA(iso){
    if(!iso) return '—';
    const [y,m,d] = iso.split('-');
    return `${d}.${m}.${y}`;
  }
  const DOW = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
  function dowShort(iso){ const d=new Date(iso+'T00:00:00'); const idx=(d.getDay()+6)%7; return DOW[idx]; }
  function esc(s){ return (s??'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function studentById(id){ return data.students.find(s=>s.id===id); }
  function groupById(id){ return data.groups.find(g=>g.id===id); }
  function studentPrice(s){ return (s && s.pricePerLesson!=null && s.pricePerLesson!=='')? Number(s.pricePerLesson) : 200; }
  function studentInAnyGroup(id){ return data.groups.some(g=> g.studentIds.includes(id)); }
  function studentVisibleInRoster(s){
    if(s.learningType==='both') return true;
    if(studentInAnyGroup(s.id)) return false;
    return true;
  }
  function lessonGroupMembers(l){
    if(!l.groupId) return [];
    const g = groupById(l.groupId);
    return g? g.studentIds.slice() : [];
  }
  // who was actually present / billable for this specific lesson instance
  function lessonAttendees(l){
    if(l.groupId){
      if(l.attendance && l.attendance.length) return l.attendance.slice();
      return lessonGroupMembers(l); // fallback for lessons created before attendance tracking
    }
    return l.studentId ? [l.studentId] : [];
  }
  function lessonInvolves(l, studentId){ return lessonAttendees(l).includes(studentId); }
  function lessonLabel(l){
    if(l.groupId){ const g = groupById(l.groupId); return g? g.name : 'Група'; }
    const s = studentById(l.studentId); return s? s.name : '—';
  }

  function studentStats(id){
    const paid = data.payments.filter(p=>p.studentId===id).reduce((s,p)=>s+Number(p.lessonsCount||0),0);
    const myLessons = data.lessons.filter(l=> lessonInvolves(l, id));
    const done = myLessons.filter(l=>l.status==='done').length;
    const balance = paid - done;
    const upcoming = myLessons.filter(l=>l.status==='planned')
      .sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time))
      .find(l=> l.date >= todayISO());
    const pastLessons = myLessons.filter(l=>l.status==='done')
      .sort((a,b)=> (b.date+b.time).localeCompare(a.date+a.time));
    const lastLessonDate = pastLessons.length? pastLessons[0].date : null;
    const studentPayments = data.payments.filter(p=>p.studentId===id).sort((a,b)=> b.date.localeCompare(a.date));
    const latestPayment = studentPayments[0] || null;
    return { paid, done, balance, upcoming, lastLessonDate, latestPayment };
  }

  function groupStats(gid){
    const g = groupById(gid);
    const members = g? g.studentIds.map(studentById).filter(Boolean) : [];
    const balances = members.map(s=> studentStats(s.id).balance);
    const minBalance = balances.length? Math.min(...balances) : null;
    const glessons = data.lessons.filter(l=> l.groupId===gid);
    const done = glessons.filter(l=>l.status==='done').sort((a,b)=> (b.date+b.time).localeCompare(a.date+a.time));
    const lastLessonDate = done.length? done[0].date : null;
    const upcoming = glessons.filter(l=>l.status==='planned' && l.date>=todayISO())
      .sort((a,b)=> (a.date+a.time).localeCompare(b.date+b.time))[0] || null;
    return { members, minBalance, lastLessonDate, upcoming, sessionsCount: done.length };
  }

  // ---------- salary helpers ----------
  function periodRange(period, anchor){
    if(period==='day') return [anchor, anchor];
    if(period==='week'){ const start=mondayOf(anchor); return [start, addDays(start,6)]; }
    if(period==='month'){
      const [y,m] = anchor.split('-');
      const start = `${y}-${m}-01`;
      const lastDay = new Date(Number(y), Number(m), 0).getDate();
      const end = `${y}-${m}-${String(lastDay).padStart(2,'0')}`;
      return [start, end];
    }
    if(period==='custom') return [ui.customFrom||anchor, ui.customTo||anchor];
    return [anchor, anchor];
  }
  function groupPrice(g){ return (g && g.pricePerLesson!=null && g.pricePerLesson!=='') ? Number(g.pricePerLesson) : 200; }
  function lessonAmount(l){
    if(l.groupId){
      const g = groupById(l.groupId);
      if(g && g.affiliation==='private'){
        const ids = lessonAttendees(l);
        return ids.reduce((sum,sid)=> sum + studentPrice(studentById(sid)), 0);
      }
      return groupPrice(g);
    }
    return studentPrice(studentById(l.studentId));
  }

  // ---------- persistence (per-user, Supabase) ----------
  async function loadData(){
    loaded = false;
    render();
    try{
      if(currentUser.mode==='name'){
        const { data: row, error } = await supabase
          .from('name_accounts')
          .select('data')
          .eq('name', currentUser.key)
          .maybeSingle();
        if(error) throw error;
        if(row && row.data){
          applyLoadedData(row.data);
        } else {
          data = freshData();
          await supabase.from('name_accounts').upsert({ name: currentUser.key, display_name: currentUser.name, data });
        }
      } else {
        const { data: row, error } = await supabase
          .from('user_data')
          .select('data')
          .eq('user_id', currentUser.id)
          .maybeSingle();
        if(error) throw error;
        if(row && row.data){
          applyLoadedData(row.data);
        } else {
          data = freshData();
          await supabase.from('user_data').upsert({ user_id: currentUser.id, data });
        }
      }
    }catch(e){
      console.error('load error', e);
      alert('Не вдалося завантажити дані. Перевірте інтернет-з’єднання та спробуйте знову.');
    }
    loaded = true;
    render();
  }
  function freshData(){
    return { students: [], payments: [], lessons: [], adjustments: [], groups: [], profileName: '', settings: { rateMode:'perLesson', rateValue:200, hiddenHours: [], theme:'light' } };
  }
  function applyLoadedData(parsed){
    data = Object.assign(freshData(), parsed);
    if(!data.settings) data.settings = { rateMode:'perLesson', rateValue:200, hiddenHours: [], theme:'light' };
    if(!data.settings.hiddenHours) data.settings.hiddenHours = [];
    if(!data.settings.theme) data.settings.theme = 'light';
    if(!data.adjustments) data.adjustments = [];
    if(!data.groups) data.groups = [];
    if(data.profileName==null) data.profileName = '';
  }
  async function saveData(){
    if(!currentUser) return;
    try{
      let error;
      if(currentUser.mode==='name'){
        ({ error } = await supabase.from('name_accounts').upsert({ name: currentUser.key, display_name: currentUser.name, data }));
      } else {
        ({ error } = await supabase.from('user_data').upsert({ user_id: currentUser.id, data }));
      }
      if(error) throw error;
    }catch(e){
      console.error('storage error', e);
      alert('Не вдалося зберегти зміни — перевірте інтернет. Спробуйте ще раз, дані на екрані поки не втрачені.');
    }
  }
  function mutate(fn){ fn(); saveData(); render(); }

  // ---------- auth screen ----------
  function renderAuth(){
    const app = document.getElementById('app');
    const isLogin = ui.authMode==='login';
    const tab = ui.authTab || 'email';
    app.innerHTML = `
      <div style="max-width:360px; margin:80px auto; text-align:center;">
        <div class="brand" style="justify-content:center; margin-bottom:24px;">
          <span class="mark">Ж</span>
          <h1>Журнал викладача</h1>
        </div>
        <div class="panel" style="text-align:left;">
          <nav class="tabs" style="margin-bottom:16px; width:100%; justify-content:center;">
            <button id="auth-tab-email" class="${tab==='email'?'active':''}" style="flex:1;">Email</button>
            <button id="auth-tab-name" class="${tab==='name'?'active':''}" style="flex:1;">Ім'я</button>
          </nav>

          ${tab==='email' ? `
            <h3>${isLogin?'Вхід':'Реєстрація'}</h3>
            <div class="field"><label>Email</label><input type="email" id="auth-email" autocomplete="username"></div>
            <div class="field"><label>Пароль</label><input type="password" id="auth-pass" autocomplete="${isLogin?'current-password':'new-password'}"></div>
            ${ui.authError? `<div style="color:var(--warn); font-size:12.5px; margin-bottom:10px;">${esc(ui.authError)}</div>` : ''}
            <button class="btn primary" id="auth-submit" style="width:100%;" ${ui.authBusy?'disabled':''}>${ui.authBusy? 'Зачекайте…' : (isLogin? 'Увійти':'Створити акаунт')}</button>
            <div style="text-align:center; margin-top:12px; font-size:12.5px;">
              ${isLogin? `Немає акаунта? <a href="#" id="auth-toggle">Зареєструватися</a>` : `Вже є акаунт? <a href="#" id="auth-toggle">Увійти</a>`}
            </div>
          ` : `
            <h3>Вхід за іменем</h3>
            <div class="field"><label>Ім'я та прізвище</label><input type="text" id="auth-name" placeholder="напр. Тарас Коваленко"></div>
            <div style="font-size:11.5px; color:var(--ink-faint); margin-bottom:12px;">
              Без пароля — введіть те саме ім'я наступного разу, і підтягнуться ваші дані. Простіше, але менш захищено: будь-хто, хто знає ваше ім'я, зможе відкрити цей акаунт.
            </div>
            ${ui.authError? `<div style="color:var(--warn); font-size:12.5px; margin-bottom:10px;">${esc(ui.authError)}</div>` : ''}
            <button class="btn primary" id="auth-name-submit" style="width:100%;" ${ui.authBusy?'disabled':''}>${ui.authBusy? 'Зачекайте…' : 'Увійти'}</button>
          `}
        </div>
      </div>
    `;
    if(tab==='email'){
      document.getElementById('auth-toggle').addEventListener('click', (e)=>{
        e.preventDefault(); ui.authMode = isLogin? 'register':'login'; ui.authError=null; renderAuth();
      });
      document.getElementById('auth-submit').addEventListener('click', async ()=>{
        const email = document.getElementById('auth-email').value.trim();
        const pass = document.getElementById('auth-pass').value;
        if(!email || !pass){ ui.authError = "Вкажіть email і пароль"; renderAuth(); return; }
        ui.authBusy = true; ui.authError = null; renderAuth();
        try{
          if(isLogin){
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if(error) throw error;
          } else {
            const { error } = await supabase.auth.signUp({ email, password: pass });
            if(error) throw error;
            ui.authBusy = false;
            ui.authError = null;
            alert('Перевірте пошту — Supabase міг надіслати лист для підтвердження email. Якщо підтвердження не потрібне (вимкнене в налаштуваннях проєкту), просто увійдіть.');
            ui.authMode = 'login';
            renderAuth();
            return;
          }
          // onAuthStateChange handles the rest
        }catch(e){
          ui.authBusy = false;
          ui.authError = translateAuthError(e.message);
          renderAuth();
        }
      });
    } else {
      document.getElementById('auth-name-submit').addEventListener('click', async ()=>{
        const raw = document.getElementById('auth-name').value.trim();
        if(!raw){ ui.authError = "Введіть ім'я та прізвище"; renderAuth(); return; }
        const key = raw.toLowerCase().replace(/\s+/g,' ').trim();
        ui.authBusy = true; ui.authError = null; renderAuth();
        currentUser = { mode:'name', name: raw, key };
        await loadData();
        ui.authBusy = false;
      });
    }
    document.getElementById('auth-tab-email').addEventListener('click', ()=>{ ui.authTab='email'; ui.authError=null; renderAuth(); });
    document.getElementById('auth-tab-name').addEventListener('click', ()=>{ ui.authTab='name'; ui.authError=null; renderAuth(); });

    // Enter key submits the visible login form
    const submitBtnId = tab==='email' ? 'auth-submit' : 'auth-name-submit';
    app.querySelectorAll('input').forEach(inputEl=>{
      inputEl.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){
          e.preventDefault();
          const btn = document.getElementById(submitBtnId);
          if(btn && !btn.disabled) btn.click();
        }
      });
    });
  }
  function translateAuthError(msg){
    if(!msg) return 'Сталася помилка. Спробуйте ще раз.';
    if(msg.includes('Invalid login credentials')) return 'Невірний email або пароль';
    if(msg.includes('User already registered')) return 'Цей email вже зареєстровано';
    if(msg.includes('Password should be at least')) return 'Пароль надто короткий (мінімум 6 символів)';
    if(msg.includes('Unable to validate email')) return 'Некоректний email';
    return msg;
  }

  // ---------- render root ----------
  function render(){
    document.body.setAttribute('data-theme', (data.settings && data.settings.theme) || 'light');
    const app = document.getElementById('app');
    if(!currentUser){ renderAuth(); return; }
    if(!loaded){ app.innerHTML = `<div class="empty">Завантаження…</div>`; return; }
    let body = '';
    if(ui.view==='schedule') body = renderSchedule();
    else if(ui.view==='students') body = renderStudentsList();
    else if(ui.view==='detail') body = renderStudentDetail(ui.selectedStudentId);
    else if(ui.view==='group-detail') body = renderGroupDetail(ui.selectedGroupId);
    else if(ui.view==='salary') body = renderSalary();
    else if(ui.view==='help') body = renderHelp();

    app.innerHTML = `
      ${renderTopbar()}
      ${body}
      ${ui.modal ? renderModal() : ''}
    `;
    attachHandlers();
  }

  // ---------- schedule ----------
  const ALL_HOURS = Array.from({length:17}, (_,i)=> i+7); // 7:00 .. 23:00
  function hourOf(timeStr){ if(!timeStr) return null; const h = parseInt(timeStr.split(':')[0],10); return isNaN(h)? null : h; }
  function lessonColorClass(l){
    if(l.groupId){
      const g = groupById(l.groupId);
      return 'group' + (g&&g.affiliation==='private' ? ' private' : '');
    }
    const s = studentById(l.studentId);
    return (s&&s.affiliation==='private') ? 'private' : '';
  }

  function renderSchedule(){
    const days = Array.from({length:7}, (_,i)=> addDays(ui.weekStart,i));
    const first = days[0], last = days[6];
    const weekLessons = data.lessons.filter(l=> days.includes(l.date));
    const hiddenHours = data.settings.hiddenHours || [];
    const visibleHours = ALL_HOURS.filter(h=> !hiddenHours.includes(h));
    const unscheduled = weekLessons.filter(l=> hourOf(l.time)===null);
    const today = todayISO();
    function dayState(iso){ return iso===today? 'today' : (iso<today? 'past' : 'future'); }

    function chipHTML(l){
      const checked = l.status==='done';
      return `<div class="grid-lesson-chip ${l.status} ${lessonColorClass(l)}" data-open-lesson="${l.id}">
          <div class="t">${esc(l.time||'')}</div>${esc(lessonLabel(l))}
          <button class="chip-check ${checked?'checked':''}" data-toggle-done="${l.id}" title="${checked?'Скасувати позначку "проведено"':'Позначити проведеним'}">${checked?'✓':''}</button>
        </div>`;
    }

    const dayHeaders = days.map(iso=>{
      return `<div class="tg-dayhead ${dayState(iso)}">
        <div class="dname">${dowShort(iso)}</div>
        <div class="dnum">${iso.slice(8,10)}.${iso.slice(5,7)}</div>
      </div>`;
    }).join('');

    const hourRows = visibleHours.map(h=>{
      const hourLabel = `<div class="tg-hourlabel" data-hide-hour="${h}" title="Клік — сховати цю годину">${String(h).padStart(2,'0')}:00</div>`;
      const dayCells = days.map(iso=>{
        const lessons = weekLessons.filter(l=> l.date===iso && hourOf(l.time)===h).sort((a,b)=>a.time.localeCompare(b.time));
        const chips = lessons.map(chipHTML).join('');
        return `<div class="tg-hour ${dayState(iso)}" data-add-lesson-at="${iso}|${String(h).padStart(2,'0')}:00">${chips}</div>`;
      }).join('');
      return hourLabel + dayCells;
    }).join('');

    const hiddenBar = hiddenHours.length? `
      <div class="hidden-hours-bar">
        Приховано годин: ${hiddenHours.slice().sort((a,b)=>a-b).map(h=> String(h).padStart(2,'0')+':00').join(', ')}
        <button class="btn small ghost" data-show-all-hours>Показати всі</button>
      </div>` : '';

    const unscheduledRow = unscheduled.length? `
      <div class="unscheduled-row">Без вказаного часу: ${unscheduled.map(l=>`<span class="grid-lesson-chip ${l.status} ${lessonColorClass(l)}" data-open-lesson="${l.id}" style="display:inline-block;">${esc(formatUA(l.date))} · ${esc(lessonLabel(l))} <button class="chip-check ${l.status==='done'?'checked':''}" data-toggle-done="${l.id}" title="${l.status==='done'?'Скасувати позначку':'Позначити проведеним'}">${l.status==='done'?'✓':''}</button></span>`).join(' ')}</div>` : '';

    return `
      <div class="week-nav">
        <button class="btn small" data-week="-1">← Тиждень</button>
        <div class="label">${formatUA(first)} — ${formatUA(last)}</div>
        <button class="btn small" data-week="1">Тиждень →</button>
        <button class="btn small ghost" data-week="0">Сьогодні</button>
      </div>
      ${hiddenBar}
      ${unscheduledRow}
      <div class="schedule-scroll">
      <div class="time-grid" style="grid-template-rows: auto repeat(${visibleHours.length}, auto);">
        <div class="tg-corner"></div>
        ${dayHeaders}
        ${hourRows}
      </div>
      </div>
    `;
  }

    const groups = data.groups
      .filter(g=> !q || g.name.toLowerCase().includes(q))
      .sort((a,b)=> a.name.localeCompare(b.name,'uk'));
    const cards = groups.map(groupCardHTML).join('') + students.map(studentCardHTML).join('');
    return cards || `<div class="empty">Нікого не знайдено</div>`;
  }

  // ---------- salary ----------
  function renderSalary(){
    const period = ui.salaryPeriod;
    const [from, to] = periodRange(period, ui.salaryAnchor);

    const lessons = data.lessons
      .filter(l=> l.status==='done' && l.date>=from && l.date<=to)
      .sort((a,b)=> a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
    const adjustments = data.adjustments
      .filter(a=> a.date>=from && a.date<=to)
      .sort((a,b)=> a.date.localeCompare(b.date));

    const lessonsTotal = lessons.reduce((sum,l)=> sum+lessonAmount(l), 0);
    const adjTotal = adjustments.reduce((sum,a)=> sum+Number(a.amount||0), 0);
    const grandTotal = lessonsTotal + adjTotal;

    const lessonRows = lessons.map(l=>{
      const amt = lessonAmount(l);
      return `<tr>
        <td>${formatUA(l.date)}${l.time? ', '+esc(l.time):''}</td>
        <td>${esc(lessonLabel(l))}${l.groupId? ` <span class="group-badge">група</span>`:''}</td>
        <td class="mono">${l.durationMin || '—'}</td>
        <td class="mono">${amt.toFixed(0)}</td>
      </tr>`;
    }).join('');

    const adjRows = adjustments.map(a=>`
      <tr>
        <td>${formatUA(a.date)}</td>
        <td colspan="2">${esc(a.note||'коригування')}</td>
        <td class="mono">${Number(a.amount)>=0?'+':''}${Number(a.amount)}</td>
        <td><button class="icon-btn" data-del-adjustment="${a.id}">✕</button></td>
      </tr>`).join('');

    const periodLabel = period==='day' ? formatUA(from)
      : period==='week' ? `${formatUA(from)} — ${formatUA(to)}`
      : period==='month' ? new Date(from+'T00:00:00').toLocaleDateString('uk-UA',{month:'long', year:'numeric'})
      : `${formatUA(from)} — ${formatUA(to)}`;

    return `
      <div class="toolbar">
        <nav class="tabs">
          <button data-salary-period="day" class="${period==='day'?'active':''}">День</button>
          <button data-salary-period="week" class="${period==='week'?'active':''}">Тиждень</button>
          <button data-salary-period="month" class="${period==='month'?'active':''}">Місяць</button>
          <button data-salary-period="custom" class="${period==='custom'?'active':''}">Період</button>
        </nav>
      </div>

      ${period==='custom' ? `
      <div class="panel" style="margin-bottom:14px;">
        <div class="row2">
          <div class="field"><label>Від</label><input type="date" value="${esc(ui.customFrom||from)}" data-custom-from></div>
          <div class="field"><label>До</label><input type="date" value="${esc(ui.customTo||to)}" data-custom-to></div>
        </div>
      </div>` : `
      <div class="week-nav">
        <button class="btn small" data-salary-nav="-1">← </button>
        <div class="label">${periodLabel}</div>
        <button class="btn small" data-salary-nav="1"> →</button>
        <button class="btn small ghost" data-salary-nav="0">Сьогодні</button>
      </div>`}

      <div class="panel">
        <div class="stat-strip">
          <div class="stat"><div class="v">${grandTotal.toFixed(0)}</div><div class="l">разом, ₴</div></div>
          <div class="stat"><div class="v">${lessons.length}</div><div class="l">занять проведено</div></div>
          <div class="stat"><div class="v">${lessonsTotal.toFixed(0)}</div><div class="l">за заняття, ₴</div></div>
          <div class="stat"><div class="v">${adjTotal>=0?'+':''}${adjTotal.toFixed(0)}</div><div class="l">коригування, ₴</div></div>
        </div>
      </div>

      <div class="panel">
        <h3>Проведені заняття</h3>
        ${lessons.length? `<table><thead><tr><th>Дата</th><th>Учень</th><th>Хв</th><th>Сума</th></tr></thead><tbody>${lessonRows}</tbody></table>` : `<div class="empty">У цьому періоді проведених занять немає</div>`}
      </div>

      <div class="panel">
        <h3>Ручні коригування <button class="btn small" data-open-modal="add-adjustment">+ Коригування</button></h3>
        ${adjustments.length? `<table><thead><tr><th>Дата</th><th colspan="2">Опис</th><th>Сума</th><th></th></tr></thead><tbody>${adjRows}</tbody></table>` : `<div class="empty">Коригувань немає</div>`}
      </div>
    `;
  }

  // ---------- help ----------

        <h2 style="font-size:20px; margin-bottom:4px;">Як користуватись «Журналом викладача»</h2>
        <div style="font-size:12.5px; color:var(--ink-faint);">Коротка інструкція по всіх розділах — від входу до зарплати.</div>
      </div>

      <div class="panel">
        <h3>1. Вхід в акаунт</h3>
        <p>Є два способи увійти — вкладки на екрані входу:</p>
        <ul>
          <li><b>Email + пароль</b> — звичайний захищений вхід. При першому вході натисніть «Зареєструватися», вкажіть email і пароль (мінімум 6 символів).</li>
          <li><b>Ім'я</b> — швидкий вхід без пароля: просто вводите ім'я та прізвище, і наступного разу з тим самим іменем підтягуються ваші дані. Зручно, але менш безпечно — будь-хто, хто знає ваше ім'я, зможе відкрити цей акаунт. Якщо почали з входу за іменем, у профілі (⚙) можна в будь-який момент «Захистити акаунт паролем» — усі дані автоматично перенесуться на захищений email-акаунт.</li>
        </ul>
        <p>Кожен вчитель, який користується сайтом, має власний окремий акаунт — дані різних вчителів між собою не перетинаються.</p>
      </div>

      <div class="panel">
        <h3>2. Розклад</h3>
        <p>Головний екран — часова сітка: зліва години (з 7:00 до 23:00), зверху дні поточного тижня.</p>
        <ul>
          <li><b>Навігація</b> — стрілки «← Тиждень» / «Тиждень →» гортають тижні вперед-назад без обмежень, «Сьогодні» повертає до поточного тижня. Усі минулі заняття зберігаються назавжди, їх завжди можна переглянути.</li>
          <li><b>Кольори днів</b> — сьогоднішній день підсвічено найяскравіше (зелений заголовок), минулі дні тижня приглушені/сірі, майбутні — звичайні.</li>
          <li><b>Кольори занять</b> — індивідуальні заняття світло-зелені, групові світло-блакитні; для «особистих» учнів/груп (поза школою) — трохи насиченіший відтінок того самого кольору, щоб відрізняти від «шкільних».</li>
          <li><b>Додати заняття</b> — клікніть на порожню клітинку в потрібний день і годину. У формі оберіть «Індивідуальне» чи «Групове» (для групового — оберіть саму групу зі списку).</li>
          <li><b>Швидке підтвердження</b> — біля кожного заняття є кружечок-галочка. Клік — заняття одразу стає «проведеним», і з балансу учня (чи всіх присутніх учасників групи) списується заняття. Повторний клік знімає позначку.</li>
          <li><b>Приховати години</b> — клік на годину зліва ховає порожній рядок, якщо в цю годину ніде немає занять. Над сіткою з'являється рядок «Приховано годин: … · Показати всі» — щоб повернути.</li>
          <li><b>Планування наперед і фіксований розклад</b> — при створенні заняття є чекбокс «Повторювати щотижня» (разове планування на кілька тижнів) або, ще зручніше, при додаванні учня/групи — чекбокс «Фіксоване заняття щотижня»: обираєте дні тижня (стільки, скільки вказано в полі «Частота на тиждень») і свій час для кожного дня — і одразу створюється серія занять на пів року наперед. Кожне з них далі можна окремо перенести, скасувати чи позначити проведеним.</li>
        </ul>
      </div>

      <div class="panel">
        <h3>3. Учні</h3>
        <p>Вкладка «Учні» — усі ваші учні та групи однаковими картками (групи виділені кольором).</p>
        <ul>
          <li><b>Тип навчання</b> — при створенні учня оберіть «Індивідуальне», «Групове» або «Індивідуальне + Групове». Суто групові учні не показуються в загальному списку — їхня картка живе всередині картки групи. «Індивідуальне + Групове» показує учня і в списку, і в групі.</li>
          <li><b>Школа / особистий учень</b> — позначає, чи це учень школи, чи ваш приватний учень поза школою. Впливає лише на колір картки й занять (легше відрізняти на око), на розрахунки не впливає (крім групової оплати, див. нижче).</li>
          <li><b>Рівень</b> — Beginner…Advanced, довідково, показується на картці.</li>
          <li><b>Ціна за заняття</b> — якщо не вказати, використовується 200 грн за замовчуванням.</li>
          <li><b>Оплата й баланс</b> — на картці учня кнопка «+ Оплата»: вписуєте будь-які два з трьох полів (сума / кількість занять / ціна за заняття) — третє порахується автоматично. Кожне «проведене» заняття автоматично списує 1 заняття з балансу.</li>
          <li><b>Тариф до</b> — дата закінчення оплаченого періоду рахується автоматично з кількості оплачених занять і частоти занять на тиждень (можна поправити вручну).</li>
          <li><b>Заморозка навчання</b> — на картці учня можна додати період заморозки (від–до) з коментарем. Дата закінчення тарифу автоматично зсунеться на кількість днів заморозки, а всі його індивідуальні заплановані заняття в цьому періоді автоматично прибираються з розкладу (групові заняття заморозка не чіпає — група продовжує займатись незалежно від того, чи всі учасники присутні).</li>
          <li><b>Контакти й характеристика</b> — окремі поля для контакту учня, контакту батьків і вільного текстового опису (рівень, цілі, нотатки).</li>
        </ul>
      </div>

      <div class="panel">
        <h3>4. Групи</h3>
        <ul>
          <li>Створюються кнопкою «+ Нова група» — вказуєте назву й відмічаєте учасників галочками.</li>
          <li><b>Оплата за групове заняття</b> — для груп «в межах школи» ціна за заняття фіксована (вказується прямо на картці групи) і не залежить від кількості учнів. Для «особистих» груп (поза школою) оплата рахується як сума цін кожного присутнього учня — кожен платить окремо.</li>
          <li><b>Картка групи</b> — усередині показані справжні картки учасників з їхнім особистим балансом і кнопкою «+ Оплата» (оплата завжди прив'язана до конкретної дитини, навіть у групі).</li>
          <li><b>Відвідуваність</b> — у списку занять групи можна клікнути на ім'я учня, щоб позначити його відсутнім саме на цьому занятті — тоді заняття не спишеться з його балансу і не порахується в зарплату за нього, хоча решті групи зарахується як завжди.</li>
        </ul>
      </div>

      <div class="panel">
        <h3>5. Зарплата</h3>
        <ul>
          <li>Перемикач періоду: День / Тиждень / Місяць / Довільний період.</li>
          <li>Сума рахується автоматично з усіх занять зі статусом «проведено» за обраний період — за ціною учня (для індивідуальних) чи ціною групи (для шкільних групових).</li>
          <li><b>Ручні коригування</b> — кнопка «+ Коригування» дозволяє додати будь-яку суму (плюс чи мінус) з описом — премія, аванс, штраф тощо — вона теж враховується в підсумок періоду.</li>
        </ul>
      </div>

      <div class="panel">
        <h3>6. Профіль і налаштування</h3>
        <p>Кнопка ⚙ з вашим іменем угорі відкриває:</p>
        <ul>
          <li><b>Тема сайту</b> — світла чи темна, перемикається одразу.</li>
          <li><b>Ваше ім'я</b> — як вас підписано в інтерфейсі (не впливає на спосіб входу).</li>
          <li><b>Пароль</b> — якщо входили за іменем, тут можна додати email і пароль для повноцінного захисту; якщо вже на email — можна змінити пароль.</li>
          <li><b>Видалення акаунту</b> — повністю стирає всіх учнів, групи, оплати й розклад без можливості відновити (з підтвердженням).</li>
        </ul>
      </div>
    `;
  }

        <td class="mono">${esc(p.amount)}</td>

      </div>

  // ---------- group detail ----------
  function renderGroupDetail(gid){
    const g = groupById(gid);
    if(!g){ ui.view='students'; return renderStudentsList(); }
    const gs = groupStats(gid);

    const memberCards = gs.members.map(memberCardHTML).join('');

    const glessons = data.lessons.filter(l=>l.groupId===gid).sort((a,b)=> b.date.localeCompare(a.date) || b.time.localeCompare(a.time));
    const lessonRows = glessons.map(l=>{
      const attendees = lessonAttendees(l);
      const chips = g.studentIds.map(sid=>{
        const st = studentById(sid);
        if(!st) return '';
        const present = attendees.includes(sid);

  const WEEKDAY_OPTIONS = [

    {v:5,l:"П'ятниця"},{v:6,l:'Субота'},{v:0,l:'Неділя'}
  ];

  function levelSelectHTML(id, current){
    return `<select id="${id}">
      <option value="">—</option>
      ${LEVEL_OPTIONS.map(lv=>`<option value="${lv}" ${current===lv?'selected':''}>${lv}</option>`).join('')}
    </select>`;
  }
  const AGE_CATEGORY_OPTIONS = [
    {v:'7-9', l:'7-9 років'},
    {v:'10-12', l:'10-12 років'},
    {v:'13-17', l:'13-17 років'},
    {v:'adult', l:'Доросле навчання'}
  ];
  function ageCategorySelectHTML(id, current){
    return `<select id="${id}">
      <option value="">—</option>
      ${AGE_CATEGORY_OPTIONS.map(a=>`<option value="${a.v}" ${current===a.v?'selected':''}>${a.l}</option>`).join('')}
    </select>`;
  }
  function ageCategoryLabel(v){ const a = AGE_CATEGORY_OPTIONS.find(a=>a.v===v); return a? a.l : ''; }
  function calcAge(birthDateISO){
    if(!birthDateISO) return null;
    const b = new Date(birthDateISO+'T00:00:00');
    const now = new Date();
    let age = now.getFullYear() - b.getFullYear();
    const m = now.getMonth() - b.getMonth();
    if(m<0 || (m===0 && now.getDate()<b.getDate())) age--;
    return age;
  }
  function fixedDayEntries(fs){
    if(!fs) return [];
    if(fs.days) return fs.days;
    if(fs.weekdays) return fs.weekdays.map(v=>({weekday:v, time:fs.time||'15:00'}));
    if(fs.weekday!=null) return [{weekday:fs.weekday, time:fs.time||'15:00'}];
    return [];
  }
  function fixedScheduleFieldsHTML(entity, freqFieldId){
    const fs = entity && entity.fixedSchedule;
    const fsDays = fixedDayEntries(fs);
    const fsLabel = fsDays.map(d=> `${WEEKDAY_OPTIONS.find(w=>w.v===d.weekday)?.l||''} ${d.time}`).join(', ');
    return `
      <div class="field" style="display:flex; align-items:center; gap:8px;">
        <input type="checkbox" id="f-fixed" style="width:auto;" ${fs?'checked':''}>
        <label style="margin:0; text-transform:none; letter-spacing:0; font-weight:400; color:var(--ink);" for="f-fixed">Фіксоване заняття щотижня${fs? ` (зараз: ${fsLabel})`:''}</label>
      </div>
      <div id="f-fixed-block" data-freq-field="${freqFieldId||''}" style="display:${fs?'':'none'};">
        <div class="field"><label>Дні тижня та час (стільки днів, скільки занять на тиждень — кожен день може мати свій час)</label>
          <div style="display:flex; flex-direction:column; gap:6px;">
            ${WEEKDAY_OPTIONS.map(w=>{
              const entry = fsDays.find(d=>d.weekday===w.v);
              return `<div style="display:flex; align-items:center; gap:10px;">
                <label style="display:flex; align-items:center; gap:5px; font-size:12.5px; text-transform:none; letter-spacing:0; font-weight:400; color:var(--ink); min-width:120px; cursor:pointer;">
                  <input type="checkbox" class="fixed-day-cb" value="${w.v}" style="width:auto;" ${entry?'checked':''}> ${w.l}
                </label>
                <input type="time" class="fixed-day-time" data-weekday="${w.v}" value="${entry?esc(entry.time):'15:00'}" style="width:120px;">
              </div>`;
            }).join('')}
          </div>
          <div id="f-fixed-day-hint" style="font-size:11px; margin-top:5px;"></div>
        </div>
        <div class="field"><label>Тижнів наперед</label><input type="number" id="f-fixed-weeks" value="26" min="1" max="52" style="max-width:140px;"></div>
        <div style="font-size:11px; color:var(--ink-faint); margin-top:-8px;">Створить серію занять наперед на щотижня, по одному на кожен обраний день у вказаний для нього час. Кожне заняття потім можна окремо перенести чи скасувати в розкладі. Повторне збереження з цією галочкою додасть ще одну серію.</div>
      </div>`;
  }

  function fixedScheduleLabel(fs){
    if(!fs) return '';
    const days = fixedDayEntries(fs);
    const label = days.map(d=> `${WEEKDAY_OPTIONS.find(w=>w.v===d.weekday)?.l||''} ${d.time}`).filter(Boolean).join(', ');
    return label;
  }

  function updateFixedDayHint(app){
    const hintEl = app.querySelector('#f-fixed-day-hint');
    if(!hintEl) return;
    const block = app.querySelector('#f-fixed-block');
    const checked = app.querySelectorAll('.fixed-day-cb:checked').length;
    const freqFieldId = block? block.dataset.freqField : '';
    const freqEl = freqFieldId? app.querySelector('#'+freqFieldId) : null;
    const freq = freqEl? Number(freqEl.value)||0 : 0;
    if(freq>0){
      const ok = checked===freq;
      hintEl.style.color = ok? 'var(--accent-dark)' : 'var(--warn)';
      hintEl.textContent = `Обрано днів: ${checked} з ${freq} потрібних (за частотою занять)`;
    } else {
      hintEl.style.color = 'var(--ink-faint)';
      hintEl.textContent = checked? `Обрано днів: ${checked}` : '';
    }
  }

        </div>
      </div>
      ` : `
      <div class="field"><label>Учень</label>
        <select id="f-student">
          ${data.students.sort((a,b)=>a.name.localeCompare(b.name,'uk')).map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}
        </select>
      </div>`)}
      <div class="field"><label>Тривалість (хв)</label><input type="number" id="f-duration" value="${preStudent&&preStudent.durationMin? preStudent.durationMin : 60}"></div>
      <div class="field"><label>Коментар</label><input type="text" id="f-comment" placeholder="необов'язково"></div>

        <input type="checkbox" id="f-repeat" style="width:auto;">
        <label style="margin:0; text-transform:none; letter-spacing:0; font-weight:400; color:var(--ink);" for="f-repeat">Повторювати щотижня (планування наперед)</label>
      </div>
      <div id="f-repeat-block" style="display:none;">
        <div class="field"><label>Кількість тижнів (включно з цим)</label><input type="number" id="f-repeat-weeks" value="4" min="2" max="52"></div>
